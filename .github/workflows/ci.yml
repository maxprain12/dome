name: CI

# Runs on every push to main and on every PR (any base branch, so stacked
# PRs over integration branches get checks too).
# Keeps checks fast: no native module rebuild, no Electron packaging.
on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # Skip postinstall (electron-rebuild, etc.) — not needed for tsc
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type check
        run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint renderer
        run: pnpm run lint

      - name: IPC inventory up to date
        run: pnpm run check:ipc-inventory

      - name: IPC Zod policy (new files)
        run: pnpm run check:ipc-zod

      - name: Tool definitions vs handlers
        run: pnpm run check:tool-coverage

      - name: Prompt tool parity (dome_load_doc)
        run: pnpm run check:prompt-tool-parity

      - name: MCP adapters smoke (langchain uuid v6)
        run: pnpm run smoke:mcp-adapters

      - name: Many thread bridge (tool results + coalescing)
        run: pnpm run test:many-thread-bridge

      - name: No legacy prompts/martin
        run: pnpm run check:prompts-martin

      - name: Design system ratchet (hardcoded colors)
        run: pnpm run check:design-system

      - name: asarUnpack guard (native addons & bundled binaries)
        run: pnpm run check:asar-unpack

      - name: Security unit tests
        run: pnpm run test:security

      - name: Build workspace packages (agent-core deps)
        # vitest resolves @dome/ai from its dist/ — install runs with
        # --ignore-scripts, so the workspace packages are never built otherwise
        run: pnpm run build:packages

      - name: Agent-core unit tests
        run: pnpm --filter @dome/agent-core run test

      - name: Dependency audit (prod, high+)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build renderer (Vite)
        run: pnpm run build

  dependency-cruiser:
    name: Dependency structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Depcruise (app)
        run: pnpm run depcruise

  architecture-check:
    name: Architecture Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no Node.js modules imported in renderer
        run: |
          # Forbid direct Node/DB in app/; block non-Node virtual module imports in renderer
          PATTERNS=(
            "from 'better-sqlite3'"
            "require('better-sqlite3')"
            "from 'bun:"
            "require('bun:"
            "from 'node:fs'"
            "require('node:fs')"
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn "$pattern" app/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "❌ Node.js module imports found in renderer process (app/)."
            echo "   Use IPC via window.electron.invoke() instead."
            exit 1
          fi

          echo "✅ Architecture check passed — no forbidden imports in renderer."
