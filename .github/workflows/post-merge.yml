name: Post-merge automation

# Runs after a PR is merged into main.
# 1. Extracts the feature flag name from the PR description (Flag: dome-xxx)
# 2. If a flag is found, enables it for the internal team in PostHog
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  enable-feature-flag:
    name: Enable PostHog flag for team
    # Only runs on actual merges (not PR closes/discards)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract feature flag from PR description
        id: extract-flag
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Parse "Flag: dome-xxx" from the PR description
          FLAG=$(echo "$PR_BODY" | grep -oP '(?<=Flag:\s)dome-[a-z0-9-]+' | head -1)

          if [ -z "$FLAG" ] || [ "$FLAG" = "none" ]; then
            echo "No feature flag found in PR description. Skipping."
            echo "flag=" >> $GITHUB_OUTPUT
          else
            echo "Found feature flag: $FLAG"
            echo "flag=$FLAG" >> $GITHUB_OUTPUT
          fi

      - name: Enable flag for internal team in PostHog
        if: steps.extract-flag.outputs.flag != ''
        env:
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          FLAG_NAME: ${{ steps.extract-flag.outputs.flag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/posthog-flag.mjs

      - name: Summary
        if: steps.extract-flag.outputs.flag != ''
        run: |
          echo "### ✅ Post-merge complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Feature flag **\`${{ steps.extract-flag.outputs.flag }}\`** has been enabled for the internal team in PostHog." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Test internally for 1-2 days" >> $GITHUB_STEP_SUMMARY
          echo "2. Gradual rollout: 10% → 25% → 50% → 100% via PostHog dashboard" >> $GITHUB_STEP_SUMMARY
          echo "3. Kill switch: toggle flag OFF in PostHog if issues appear (instant, no deploy)" >> $GITHUB_STEP_SUMMARY
