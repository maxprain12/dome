name: Build Electron App

# Solo se ejecuta al publicar un GitHub Release (no en push/PR a main).
# Flujo: crear el release (etiqueta + notas) y publicarlo → este workflow
# compila macOS/Windows/Linux y sube los artefactos al mismo release.
# workflow_dispatch permite probar builds Linux sin publicar release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: 'Attach artifacts to the latest GitHub release (manual only)'
        type: boolean
        default: false

# Permite subir activos al release (electron-publish / action-gh-release) con GITHUB_TOKEN.
permissions:
  contents: write

env:
  NODE_VERSION: '24'
  # GH_TOKEN solo en attach-artifacts (no workflow-level: evita postinstall con secretos en el entorno).
  # Evita avisos de deprecación de Node 20 en actions/checkout, setup-node, etc. (hasta junio 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # pnpm sin TTY (evita abortos tipo confirmModulesPurge / purga de node_modules)
  CI: true
  # git+https / submódulos: no colgar esperando credenciales en el runner
  GIT_TERMINAL_PROMPT: '0'

jobs:
  # macOS build
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Bootstrap release dependencies (trusted scripts only)
        run: pnpm run bootstrap:release-deps

      - name: Build Vite, natives, embed env, pack (macOS)
        run: |
          pnpm run materialize:workspace-deps
          pnpm run build
          pnpm run verify:workspace-deps
          pnpm run verify:natives
          node scripts/embed-env.cjs
          node scripts/verify-sentry-build.cjs
          if [ -z "$CSC_LINK" ] || [ "$CSC_LINK" = "" ]; then
            echo "No code signing credentials, building without signing..."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            pnpm run electron:pack -- --mac --arm64 --x64 --config.mac.identity=null --config.mac.notarize=false --publish never
          else
            echo "Code signing credentials found, building with signing..."
            pnpm run electron:pack -- --mac --arm64 --x64 --publish never
          fi
        env:
          DOME_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_ID }}
          DOME_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_SECRET }}
          DOME_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_ID }}
          DOME_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_SECRET }}
          DOME_PROVIDER_URL: ${{ secrets.DOME_PROVIDER_URL }}
          DOME_GITHUB_CLIENT_ID: ${{ secrets.DOME_GITHUB_CLIENT_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # Sentry: VITE_SENTRY_DSN → renderer (Vite inlines it at build);
          # SENTRY_DSN → main process (baked by embed-env.cjs into app-credentials).
          # Both fall back to the same DSN secret so one value drives both.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alder-dario-velasquez-obando
          SENTRY_PROJECT: electron

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dome-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

  # Windows build
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Bootstrap release dependencies (trusted scripts only)
        run: pnpm run bootstrap:release-deps

      - name: Build Vite, natives, embed env, pack (Windows)
        run: |
          pnpm run materialize:workspace-deps
          pnpm run build
          pnpm run verify:workspace-deps
          pnpm run verify:natives
          node scripts/embed-env.cjs
          node scripts/verify-sentry-build.cjs
          pnpm run electron:pack -- --win --publish never
        env:
          DOME_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_ID }}
          DOME_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_SECRET }}
          DOME_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_ID }}
          DOME_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_SECRET }}
          DOME_PROVIDER_URL: ${{ secrets.DOME_PROVIDER_URL }}
          DOME_GITHUB_CLIENT_ID: ${{ secrets.DOME_GITHUB_CLIENT_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # Sentry: VITE_SENTRY_DSN → renderer (Vite inlines it at build);
          # SENTRY_DSN → main process (baked by embed-env.cjs into app-credentials).
          # Both fall back to the same DSN secret so one value drives both.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alder-dario-velasquez-obando
          SENTRY_PROJECT: electron

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dome-windows
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  # Linux build (AppImage + Flatpak)
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: linux-eb-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            linux-eb-

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: linux-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            linux-electron-

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: linux-flatpak-2408-v1
          restore-keys: |
            linux-flatpak-

      - name: Install Flatpak toolchain and runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Bootstrap release dependencies (trusted scripts only)
        run: pnpm run bootstrap:release-deps

      - name: Build Vite, natives, embed env, pack (Linux)
        run: |
          pnpm run materialize:workspace-deps
          pnpm run build
          pnpm run verify:workspace-deps
          pnpm run verify:natives
          node scripts/embed-env.cjs
          node scripts/verify-sentry-build.cjs
          pnpm run electron:pack -- --linux AppImage flatpak --publish never
        env:
          DOME_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_ID }}
          DOME_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_SECRET }}
          DOME_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_ID }}
          DOME_GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_CALENDAR_CLIENT_SECRET }}
          DOME_PROVIDER_URL: ${{ secrets.DOME_PROVIDER_URL }}
          DOME_GITHUB_CLIENT_ID: ${{ secrets.DOME_GITHUB_CLIENT_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # Sentry: VITE_SENTRY_DSN → renderer (Vite inlines it at build);
          # SENTRY_DSN → main process (baked by embed-env.cjs into app-credentials).
          # Both fall back to the same DSN secret so one value drives both.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alder-dario-velasquez-obando
          SENTRY_PROJECT: electron

      - name: Verify Linux artifacts
        run: |
          ls -lh release/
          chmod +x release/*.AppImage
          test -x release/*.AppImage
          test -f release/*.flatpak

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dome-linux
          path: |
            release/*.AppImage
            release/*.flatpak
          if-no-files-found: error

  # Adjunta DMG/ZIP/EXE/AppImage/Flatpak al release que disparó el workflow (no crea otro release).
  attach-artifacts:
    needs: [build-macos, build-windows, build-linux]
    if: github.event_name == 'release' || inputs.attach_to_release == true
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(gh release view --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            artifacts/dome-macos/*
            artifacts/dome-windows/*
            artifacts/dome-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
