name: Build Electron App

# Solo se ejecuta al publicar un GitHub Release (no en push/PR a main).
# Flujo: crear el release (etiqueta + notas) y publicarlo → este workflow
# compila macOS/Windows y sube los artefactos al mismo release.
on:
  release:
    types: [published]

env:
  NODE_VERSION: '24'

jobs:
  # macOS build
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Rebuild native modules
        run: bun run rebuild:natives

      - name: Verify native modules
        run: bun run verify:natives

      - name: Build Electron (macOS)
        run: |
          if [ -z "$CSC_LINK" ] || [ "$CSC_LINK" = "" ]; then
            echo "⚠️  No code signing credentials, building without signing..."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            bun run electron:build -- --mac --config.mac.identity=null --config.mac.notarize=false --publish never
          else
            echo "✓ Code signing credentials found, building with signing..."
            bun run electron:build -- --mac --publish never
          fi
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          DOME_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_ID }}
          DOME_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_SECRET }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dome-macos
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

  # Windows build
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Rebuild native modules
        run: bun run rebuild:natives

      - name: Verify native modules
        run: bun run verify:natives

      - name: Build Electron (Windows)
        run: bun run electron:build -- --win --publish never
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          DOME_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_ID }}
          DOME_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.DOME_GOOGLE_DRIVE_CLIENT_SECRET }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dome-windows
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  # Adjunta DMG/ZIP/EXE al release que disparó el workflow (no crea otro release).
  attach-artifacts:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Upload build assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dome-macos/*
            artifacts/dome-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
